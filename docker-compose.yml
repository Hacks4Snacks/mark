# mindex — container orchestration.
#
# Mounts your local conversation stores READ-ONLY and points mindex at them.
# The derived index (mindex.db) lives in the named volume `mindex-data`.
#
# Start:   docker compose up --build -d   →  http://127.0.0.1:8765
# Reindex: open the UI and click ⟳ (or `docker compose restart`)
#
# The paths below are for macOS + VS Code (stable). For other setups, edit the
# three host paths under `volumes` (see the table in README.md):
#   • VS Code Insiders → "Code - Insiders" instead of "Code"
#   • Linux            → ${HOME}/.config/Code/User/...
#   • Windows          → %APPDATA%/Code/User/... (use WSL paths under Docker)

services:
  mindex:
    build: .
    image: mindex:latest
    container_name: mindex
    # Bind to localhost on the host only — this is a personal app.
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      MINDEX_VSCODE_STORAGE: /sources/vscode/workspaceStorage
      MINDEX_VSCODE_GLOBAL_STORAGE: /sources/vscode/globalStorage
      MINDEX_COPILOT_STORE: /sources/copilot/session-store.db
      MINDEX_SESSION_STATE: /sources/copilot/session-state
      # Set to 1 to also index/embed background automation runs.
      # MINDEX_EMBED_AUTOMATION: "1"
    volumes:
      - mindex-data:/app/data
      # --- your conversation sources, mounted READ-ONLY ---
      - "${HOME}/Library/Application Support/Code/User/workspaceStorage:/sources/vscode/workspaceStorage:ro"
      - "${HOME}/Library/Application Support/Code/User/globalStorage:/sources/vscode/globalStorage:ro"
      - "${HOME}/.copilot:/sources/copilot:ro"
    restart: unless-stopped

volumes:
  mindex-data:
