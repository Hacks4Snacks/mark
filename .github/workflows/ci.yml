name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUFF_VERSION: "0.15.9"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff==${RUFF_VERSION}"
      - name: ruff check
        run: ruff check --output-format=github mark tests

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  build:
    name: Build & verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Verify distribution metadata
        run: twine check --strict dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (amd64, load locally)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: mark:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test (/api/status)
        run: |
          set -euo pipefail
          docker run -d --name mark-ci -p 8765:8765 mark:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/api/status >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          docker logs mark-ci || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::mark container did not become healthy on /api/status"
            exit 1
          fi
          echo "Smoke test passed:"
          curl -fsS http://127.0.0.1:8765/api/status
      - name: Cleanup
        if: always()
        run: docker rm -f mark-ci || true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # PR-only supply-chain check; needs the repo Dependency Graph (on by default
    # for public repos). Flags newly introduced vulnerable dependencies.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
