name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR & tag
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # release-please opens/updates a "release PR" that bumps the version
          # and CHANGELOG from Conventional Commits. Merging it creates the
          # `v<version>` tag + GitHub Release, which in turn triggers the
          # tag-based release workflows (release.yml -> build + GitHub Release
          # artifacts, docker-publish.yml -> GHCR). NOTE: PyPI publishing is
          # currently disabled (commented out) in release.yml.
          #
          # A PAT or GitHub App token is REQUIRED for that hand-off: tags pushed
          # by the default GITHUB_TOKEN do NOT trigger other workflows. Add a
          # repo secret named RELEASE_PLEASE_TOKEN (contents: write, on a public
          # repo also `workflow`). Without it the release PR + CHANGELOG still
          # work, but the release artifacts + GHCR image won't be produced
          # automatically.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
