name: Model Pricing Audit

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: model-pricing-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit official sources and LiteLLM
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.pricing-audit.outputs.status }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Audit upstream data
        id: pricing-audit
        shell: bash
        run: |
          mkdir -p .pricing-audit
          set +e
          output=$(python scripts/update_model_pricing.py \
            --audit \
            --report .pricing-audit/model-pricing-audit.md 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          case "$status" in
            0|1|2) ;;
            *) printf 'Unexpected audit exit status: %s\n' "$status" ;;
          esac
          if [[ ! -s .pricing-audit/model-pricing-audit.md ]]; then
            {
              printf '# Model Pricing Audit\n\n'
              printf 'Audit failed before a structured report was generated.\n\n'
              printf '```text\n%s\n```\n' "$output"
            } > .pricing-audit/model-pricing-audit.md
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Add audit report to summary
        if: always()
        run: cat .pricing-audit/model-pricing-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: model-pricing-audit
          path: .pricing-audit/model-pricing-audit.md
          if-no-files-found: error

      - name: Enforce audit outcome
        if: always()
        env:
          AUDIT_STATUS: ${{ steps.pricing-audit.outputs.status }}
        run: |
          case "$AUDIT_STATUS" in
            0|2) exit 0 ;;
            1)
              echo "Model pricing audit could not complete" >&2
              exit 1
              ;;
            *)
              echo "Unexpected model pricing audit status: $AUDIT_STATUS" >&2
              exit 1
              ;;
          esac

  maintain-pr:
    name: Maintain draft review PR
    needs: audit
    if: >-
      always() &&
      (needs.audit.outputs.status == '0' || needs.audit.outputs.status == '2')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    env:
      AUDIT_STATUS: ${{ needs.audit.outputs.status }}
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      BRANCH: automation/model-pricing-audit
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_BODY: |
        Automated model-pricing audit detected an official source-page change
        or a tracked LiteLLM price conflict.

        Review the generated report, verify every proposed change against the
        linked official provider page, update `mark/model_pricing.json`, refresh
        source snapshots, and remove the report before merging.

        LiteLLM is a discovery and cross-check source, not pricing authority.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download audit report
        if: env.AUDIT_STATUS == '2'
        uses: actions/download-artifact@v7
        with:
          name: model-pricing-audit
          path: .pricing-audit

      - name: Create or update draft review PR
        if: env.AUDIT_STATUS == '2'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" 2>/dev/null || true
          git switch -C "$BRANCH" "$GITHUB_SHA"
          git add .pricing-audit/model-pricing-audit.md
          git commit -m "chore(pricing): refresh model pricing audit"
          git push --force-with-lease origin "HEAD:refs/heads/$BRANCH"

          pr=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -z "$pr" ]]; then
            pr=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$BRANCH" \
              --draft \
              --title "chore(pricing): review upstream model changes" \
              --body "$PR_BODY")
          else
            gh pr edit "$pr" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(pricing): review upstream model changes" \
              --body "$PR_BODY"
          fi
          if [[ $(gh pr view "$pr" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft \
            --jq .isDraft) != "true" ]]; then
            gh pr ready "$pr" --repo "$GITHUB_REPOSITORY" --undo
          fi

      - name: Close clean review PR
        if: env.AUDIT_STATUS == '0'
        shell: bash
        run: |
          pr=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -n "$pr" ]]; then
            gh pr close "$pr" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "The model-pricing audit baseline is clean again."
          fi
          if gh api \
            "repos/$GITHUB_REPOSITORY/git/ref/heads/$BRANCH" >/dev/null 2>&1; then
            gh api --method DELETE \
              "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH"
          fi