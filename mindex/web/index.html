<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mindex · your searchable AI chat archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/api/pygments.css" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brandHome" title="Home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4h12a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-7l-4 3.5V17H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3z" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/>
          <path d="M12 7l1 2.3 2.3 1-2.3 1-1 2.3-1-2.3-2.3-1 2.3-1z" fill="#fff"/>
        </svg>
      </span>
      <div class="brand-text">
        <strong>mindex</strong>
        <small>your searchable AI chat archive</small>
      </div>
    </div>

    <div class="searchwrap">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 110-16 8 8 0 010 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="search" type="search" placeholder="Search your conversations by meaning or keyword…" autocomplete="off" spellcheck="false" />
      <div class="segmented" id="modeToggle" role="tablist">
        <button data-mode="hybrid" class="active" title="Keyword + semantic">Hybrid</button>
        <button data-mode="semantic" title="Find by meaning">Semantic</button>
        <button data-mode="keyword" title="Exact words">Keyword</button>
      </div>
    </div>

    <div class="actions">
      <button id="addBtn" class="btn btn-primary" title="Add a note or file" aria-label="Add a note or file">＋ Add</button>
      <button id="reindexBtn" class="btn" title="Re-scan now · auto-syncs new sessions automatically" aria-label="Re-scan history now">⟳</button>
      <button id="themeBtn" class="btn" title="Toggle theme" aria-label="Toggle light or dark theme">◐</button>
    </div>
  </header>

  <div id="readProgress" class="read-progress" role="progressbar" aria-label="Reading progress" hidden></div>

  <main class="layout">
    <aside class="sidebar">
      <div class="stat-cards" id="statCards"></div>

      <div class="filter-group">
        <h4>Source</h4>
        <div id="sourceFilters" class="chips"></div>
        <label class="toggle" id="autoToggleRow" hidden>
          <input type="checkbox" id="includeAutomation" />
          <span>Include automation runs <em id="autoCount"></em></span>
        </label>
      </div>

      <div class="filter-group">
        <h4>Sort</h4>
        <select id="sortSelect">
          <option value="recent">Most recent</option>
          <option value="oldest">Oldest</option>
          <option value="turns">Longest</option>
          <option value="title">Title A–Z</option>
        </select>
      </div>

      <div class="filter-group">
        <h4>Date range</h4>
        <div class="date-range">
          <input type="date" id="dateFrom" aria-label="From date" />
          <span class="date-sep" aria-hidden="true">→</span>
          <input type="date" id="dateTo" aria-label="To date" />
        </div>
      </div>

      <div class="filter-group">
        <h4>Repositories</h4>
        <div id="repoFilters" class="facet-list"></div>
      </div>

      <div class="filter-group">
        <h4>Topics</h4>
        <div id="tagFilters" class="chips tag-cloud"></div>
      </div>

      <button id="clearFilters" class="btn btn-ghost btn-block">Clear filters</button>
    </aside>

    <section class="content">
      <div id="statusBanner" class="banner" hidden></div>

      <!-- LIST VIEW -->
      <div id="listView">
        <div class="list-head">
          <h2 id="listTitle">Recent sessions</h2>
          <span id="listCount" class="muted"></span>
        </div>
        <div id="activeFilters" class="active-filters" hidden></div>
        <div id="results" class="results"></div>
      </div>

      <!-- DETAIL VIEW -->
      <article id="detailView" class="detail" hidden></article>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <dialog id="addDialog" class="dialog">
    <form method="dialog" id="addForm">
      <div class="dialog-head">
        <div class="segmented" id="addModeToggle">
          <button type="button" data-add="note" class="active">Note</button>
          <button type="button" data-add="file">File</button>
        </div>
        <button type="button" class="btn btn-ghost" id="addClose">✕</button>
      </div>

      <div id="notePane">
        <input id="noteTitle" placeholder="Title" />
        <textarea id="noteText" rows="10" placeholder="Paste a snippet, decision, link, or any note you want to find later…"></textarea>
      </div>

      <div id="filePane" hidden>
        <label class="dropzone" id="dropzone">
          <input type="file" id="fileInput" hidden />
          <span>Drop a file — or a ChatGPT <code>conversations.json</code> export — or <u>browse</u></span>
          <small id="fileName" class="muted"></small>
        </label>
      </div>

      <div class="dialog-foot">
        <button type="button" class="btn" id="addCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="addSave">Save to mindex</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
